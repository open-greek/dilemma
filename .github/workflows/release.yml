name: Release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    # Inherit the exact same job that gates main, including install steps.
    # Prevents the dep-drift class of bug that bit the v0.7.0 first attempt.
    uses: ./.github/workflows/test.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

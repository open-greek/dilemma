name: Release

on:
  push:
    # Accept legacy v-prefixed tags (v0.7.0) and bumpver's default style
    # (0.7.1) so `bumpver update --patch` can fire this without needing
    # a wrapper script to add the v.
    tags:
      - "v*"
      - "[0-9]*"

jobs:
  test:
    # Inherit the exact same job that gates main, including install steps.
    # Prevents the dep-drift class of bug that bit the v0.7.0 first attempt.
    uses: ./.github/workflows/test.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

  # Auto-publish to PyPI on tag via Trusted Publishing (OIDC; no stored token).
  # Two one-time steps are required before this can succeed:
  #   1. [project].name in pyproject.toml must be an AVAILABLE PyPI name
  #      (plain "dilemma" is already taken by an unrelated package).
  #   2. Register a (pending) Trusted Publisher on PyPI for that project name,
  #      repo open-greek/dilemma, workflow release.yml. Until then this job
  #      fails while the test + GitHub Release jobs still succeed.
  publish:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

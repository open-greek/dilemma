name: Release

on:
  push:
    # Accept legacy v-prefixed tags (v0.7.0) and bumpver's default style
    # (0.7.1) so `bumpver update --patch` can fire this without needing
    # a wrapper script to add the v.
    tags:
      - "v*"
      - "[0-9]*"

jobs:
  test:
    # Inherit the exact same job that gates main, including install steps.
    # Prevents the dep-drift class of bug that bit the v0.7.0 first attempt.
    uses: ./.github/workflows/test.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

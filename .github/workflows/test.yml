name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Reusable from release.yml so tag-fired releases run the exact same
  # test job that gates main, preventing dep drift between the two.
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - name: Install Python dependencies
        run: |
          pip install -q --upgrade pip
          pip install -q pytest huggingface_hub
          pip install -q torch --index-url https://download.pytorch.org/whl/cpu
          pip install -q transformers

      - name: Download lookup data from HuggingFace Hub
        run: hf download ciscoriordan/dilemma data/lookup.db data/spell_index.db data/lemma_attestation.json --local-dir .

      - name: Run all tests
        run: python3 -m pytest tests/ -x -v
